<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annapurna Kitchen — Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --charcoal:#1C1A17;
    --terracotta:#C9603C;
    --gold:#D4A24E;
    --cream:#F7F1E5;
    --sage:#7A8B6F;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--cream);
    color:var(--charcoal);
    font-family:'Inter',sans-serif;
    padding-bottom:50px;
    min-height:100vh;
  }
  header{
    background:var(--charcoal);
    color:var(--cream);
    text-align:center;
    padding:48px 20px 36px;
    position:relative;
    overflow:hidden;
  }
  header::after{
    content:"";
    position:absolute; left:0; right:0; bottom:0;
    height:6px;
    background:repeating-linear-gradient(45deg,var(--gold) 0 10px,var(--terracotta) 10px 20px);
  }
  header h1{
    font-family:'Fraunces',serif;
    font-weight:900;
    font-size:2.4rem;
    letter-spacing:0.5px;
  }
  header .sub{
    font-size:0.85rem;
    color:var(--gold);
    letter-spacing:3px;
    text-transform:uppercase;
    margin-top:8px;
  }

  .tabs{
    display:flex; gap:8px; overflow-x:auto;
    padding:20px 16px 4px;
    -webkit-overflow-scrolling:touch;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    flex:0 0 auto;
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:0.95rem;
    padding:8px 18px;
    border-radius:999px;
    background:transparent;
    border:1.5px solid var(--charcoal);
    color:var(--charcoal);
    cursor:pointer;
    white-space:nowrap;
    transition:all .2s ease;
  }
  .tab.active{
    background:var(--terracotta);
    border-color:var(--terracotta);
    color:var(--cream);
  }

  main{padding:8px 16px 0;}

  .category-title{
    font-family:'Fraunces',serif;
    font-weight:900;
    font-size:1.6rem;
    margin:28px 0 4px;
    color:var(--terracotta);
  }
  .category-title .rule{
    display:block;
    width:46px;height:3px;
    background:var(--gold);
    margin-top:6px;border-radius:2px;
  }

  .menu-item{
    display:flex;justify-content:space-between;align-items:flex-start;
    gap:14px;
    padding:16px 0;
    border-bottom:1px dashed rgba(28,26,23,0.15);
  }
  .menu-item:last-child{border-bottom:none;}
  .item-info h3{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:1.1rem;
    margin-bottom:3px;
  }
  .item-info p{
    font-size:0.85rem;
    color:#6b6258;
    line-height:1.4;
    max-width:46ch;
  }
  .price{
    font-family:'Fraunces',serif;
    font-weight:900;
    font-size:1.1rem;
    color:var(--sage);
    white-space:nowrap;
    padding-top:2px;
  }

  footer{
    text-align:center;
    margin-top:40px;
    font-size:0.78rem;
    color:#a39a8e;
    letter-spacing:1px;
    text-transform:uppercase;
  }

  .state{
    text-align:center;
    padding:60px 20px;
    color:#a39a8e;
  }
  .state h2{
    font-family:'Fraunces',serif;
    font-size:1.4rem;
    color:var(--charcoal);
    margin-bottom:10px;
  }
</style>
</head>
<body>

<header>
  <h1>Annapurna Kitchen</h1>
  <div class="sub">Digital Menu</div>
</header>

<div class="tabs" id="tabs"></div>

<main id="menu-main">
  <div class="state"><h2>Loading menu…</h2></div>
</main>

<footer>Prices inclusive of all taxes</footer>

<script>
const CSV_FILE = "menu.csv";

function parseCSV(text){
  const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l.length);
  let start = 0;
  if(lines.length && /^category\s*,/i.test(lines[0])) start = 1;

  const items = [];
  for(let i=start;i<lines.length;i++){
    const parts = [];
    let cur="", inQ=false;
    for(const ch of lines[i]){
      if(ch==='"'){inQ=!inQ;continue;}
      if(ch===','&&!inQ){parts.push(cur);cur="";continue;}
      cur+=ch;
    }
    parts.push(cur);
    const [category,item,price,description] = parts.map(p=>(p||"").trim());
    if(!item) continue;
    items.push({category:category||"Other",item,price:price||"",description:description||""});
  }
  return items;
}

function escapeHTML(str){
  return (str||"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function render(items){
  const main = document.getElementById("menu-main");
  const tabs = document.getElementById("tabs");
  main.innerHTML = "";
  tabs.innerHTML = "";

  if(!items || items.length===0){
    main.innerHTML = `<div class="state"><h2>Menu coming soon</h2><p>Please check back shortly.</p></div>`;
    return;
  }

  const categories = [];
  const grouped = {};
  items.forEach(it=>{
    if(!grouped[it.category]){grouped[it.category]=[];categories.push(it.category);}
    grouped[it.category].push(it);
  });

  categories.forEach((cat,i)=>{
    const tab = document.createElement("button");
    tab.className = "tab" + (i===0 ? " active":"");
    tab.textContent = cat;
    tab.onclick = ()=>{
      document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
      tab.classList.add("active");
      document.getElementById("cat-"+i).scrollIntoView({behavior:"smooth",block:"start"});
    };
    tabs.appendChild(tab);

    const section = document.createElement("section");
    section.id = "cat-"+i;
    section.innerHTML = `<div class="category-title">${escapeHTML(cat)}<span class="rule"></span></div>`;

    grouped[cat].forEach(it=>{
      const row = document.createElement("div");
      row.className = "menu-item";
      row.innerHTML = `
        <div class="item-info">
          <h3>${escapeHTML(it.item)}</h3>
          ${it.description ? `<p>${escapeHTML(it.description)}</p>` : ""}
        </div>
        <div class="price">${it.price ? "₹"+escapeHTML(it.price) : ""}</div>
      `;
      section.appendChild(row);
    });

    main.appendChild(section);
  });
}

fetch(CSV_FILE + "?t=" + Date.now()) // cache-bust so updates show immediately
  .then(res=>{
    if(!res.ok) throw new Error("menu.csv not found");
    return res.text();
  })
  .then(text=>{
    const items = parseCSV(text);
    render(items);
  })
  .catch(err=>{
    document.getElementById("menu-main").innerHTML =
      `<div class="state"><h2>Menu unavailable</h2><p>${escapeHTML(err.message)}</p></div>`;
  });
</script>

</body>
</html>
